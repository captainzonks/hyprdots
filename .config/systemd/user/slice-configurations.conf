[Unit]
Description=Configure resource slices for applications

[Service]
Type=oneshot
RemainAfterExit=yes
ExecStart=/bin/bash -c 'echo "Creating optimized cgroup slices"'

# Configure application slice - for user-facing apps
ExecStartPost=/bin/systemctl --user set-property app-graphical.slice \
	MemoryAccounting=true \
	MemoryHigh=2G \
	MemoryMax=3G \
	CPUAccounting=true \
	CPUQuota=200%%

# Configure background slice - for system services
ExecStartPost=/bin/systemctl --user set-property background-graphical.slice \
	MemoryAccounting=true \
	MemoryHigh=512M \
	MemoryMax=1G \
	CPUQuota=50%%

[Install]
WantedBy=hyprland-session.target
