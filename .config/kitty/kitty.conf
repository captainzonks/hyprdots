# Kitty Terminal - Argonaut Desktop (RTX 3080)

# Font
# font_family      Meslo LGMDZ Nerd Font Mono-Regular
# bold_font        Meslo LGMDZ Nerd Font Mono-Bold
# italic_font      Meslo LGMDZ Nerd Font Mono-Italic
# bold_italic_font Meslo LGMDZ Nerd Font Mono-BoldItalic
font_size 12.0

disable_ligatures never
box_drawing_scale 0.001, 1, 1.5, 2

# Window
initial_window_width  120c
initial_window_height 30c
window_padding_width  8
remember_window_size  yes
confirm_os_window_close 0

# Shell
shell /usr/bin/zsh
shell_integration enabled

# Performance - RTX 3080
sync_to_monitor yes
repaint_delay 8
input_delay 2

# Scrollback
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

# Mouse
mouse_hide_wait 3.0
url_style curly
copy_on_select no

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 15.0

# Audio
enable_audio_bell no
visual_bell_duration 0.0

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# Advanced
allow_remote_control yes
listen_on unix:@mykitty
update_check_interval 0

# Background
background_opacity 0.85

# Wayland
wayland_titlebar_color system
linux_display_server auto

# Keyboard shortcuts
map ctrl+shift+enter new_window
map ctrl+shift+q     close_window
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+up   scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end  scroll_end
map ctrl+shift+equal  change_font_size all +1.0
map ctrl+shift+minus  change_font_size all -1.0
map ctrl+shift+0      change_font_size all 0

