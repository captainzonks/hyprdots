# Hyprpaper configuration (Hyprland v0.53.0+)
# Note: IPC commands changed in recent versions - only 'wallpaper' command is available
# Syntax: wallpaper = [monitor],[path],[fit_mode]
# fit_mode options: contain, cover (default), tile, fill

preload = $HOME/Pictures/wallpaper/default.jpg
wallpaper = ,$HOME/Pictures/wallpaper/default.jpg
splash = false
