#==========================================================#
#                 DECORATION CONFIGURATION                 #
#==========================================================#
# File: decoration.conf  
# Purpose: Window decoration settings (consolidated from laptop-optimized variant)
# Last Updated: 2025-06-30
# Documentation: https://wiki.hyprland.org/Configuring/Variables/#decoration
#==========================================================#

# -----------------------------------------------------
# Laptop-optimized decorations
# name: "Laptop Performance"
# -----------------------------------------------------

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 3          # Reduced from 6
        passes = 1        # Reduced from 2  
        new_optimizations = true
        ignore_opacity = true
        xray = false      # Disabled for performance
        popups = true
    }

    shadow {
        enabled = true # Disabled for performance
    }
}
