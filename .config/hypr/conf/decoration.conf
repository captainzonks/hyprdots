# Decoration Configuration - Argonaut Desktop
# RTX 3080 can handle more blur passes than laptop

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        popups = true
    }

    shadow {
        enabled = true
    }
}
