# -----------------------------------------------------
# General workspace rules
# name: "Default"
# -----------------------------------------------------

# Monitor-specific workspace assignments for predictable multi-monitor behavior
# Documentation: https://wiki.hyprland.org/Configuring/Workspace-Rules/ (Hyprland 0.45.0+)
#
# Layout strategy:
# - Workspaces 1-5: Laptop display (eDP-1) - Mobile/single-display workflows
# - Workspaces 6-10: External display (DP-1) - Multi-monitor workflows
#
# This creates consistent behavior:
# - Switching to workspace 1-5 always focuses laptop screen
# - Switching to workspace 6-10 always focuses external screen
# - When external disconnects, all workspaces migrate to laptop (handled by migrate_workspaces_to_laptop.sh)

# Laptop display workspaces (eDP-1)
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1

# External display workspaces (DP-1)
# These automatically fall back to laptop when external is disconnected
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1

# Example rules for future customization (from https://wiki.hyprland.org/Configuring/Workspace-Rules/)
# workspace = 3, rounding:false, decorate:false
# workspace = name:coding, rounding:false, decorate:false, gapsin:0, gapsout:0, border:false, monitor:DP-1
# workspace = 8, bordersize:8
# workspace = name:Hello, monitor:DP-1, default:true
# workspace = 5, on-created-empty:[float] firefox
# workspace = special:scratchpad, on-created-empty:foot

# -----------------------------------------------------
# Application workspace rules
# name: "Moonlight"
# -----------------------------------------------------
workspace = 10, name:moonlight

# -----------------------------------------------------
# Alt Tab workspace rules
# name: "Alttab"
# -----------------------------------------------------
workspace = special:alttab, gapsout:0, gapsin:0, bordersize:0
