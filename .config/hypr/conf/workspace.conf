# Workspace Configuration - Argonaut Desktop
# Bound by monitor description, not connector name (DP-1/DP-3 shift on replug).
# Split: 1-5 on Onkyo AVR (theater), 6-10 on LG ULTRAGEAR (LAN).
# When a bound monitor is absent, Hyprland falls its workspaces back to the
# only present monitor, so all 10 stay usable in single-display setups:
#   Theater (Onkyo only): 6-10 fall back to Onkyo
#   LAN (LG only):        1-5 fall back to LG

workspace = 1, monitor:desc:ONKYO Corporation AV Receiver, default:true
workspace = 2, monitor:desc:ONKYO Corporation AV Receiver
workspace = 3, monitor:desc:ONKYO Corporation AV Receiver
workspace = 4, monitor:desc:ONKYO Corporation AV Receiver
workspace = 5, monitor:desc:ONKYO Corporation AV Receiver
workspace = 6, monitor:desc:LG Electronics LG ULTRAGEAR 407NTNH69143
workspace = 7, monitor:desc:LG Electronics LG ULTRAGEAR 407NTNH69143
workspace = 8, monitor:desc:LG Electronics LG ULTRAGEAR 407NTNH69143
workspace = 9, monitor:desc:LG Electronics LG ULTRAGEAR 407NTNH69143
workspace = 10, monitor:desc:LG Electronics LG ULTRAGEAR 407NTNH69143

# Alt Tab
workspace = special:alttab, gapsout:0, gapsin:0, bordersize:0
