#==========================================================#
#                  MONITOR CONFIGURATION                   #
#==========================================================#
# File: monitor.conf
# Purpose: Monitor and display settings (consolidated from spartan variant)
# Last Updated: 2025-06-30
# Documentation: https://wiki.hyprland.org/Configuring/Monitors/
#==========================================================#

# Documentation: https://wiki.hyprland.org/Configuring/Monitors/
# Version: Compatible with Hyprland 0.45.0+

# External display (DP-1) - Primary when connected
# The 'auto' position lets Hyprland decide optimal placement
monitor=DP-1,2560x1440@120,auto,1.0,bitdepth,8,vrr,2

# Laptop display (eDP-1) - Always available as fallback
# Using 'auto' position prevents coordinate conflicts
monitor=eDP-1,1920x1080@60,auto,1.0

# =============================================================================
# FALLBACK RULES: These ensure something always works
# =============================================================================

# Universal fallback - any unspecified monitor gets preferred settings
monitor=,preferred,auto,1.0

# Emergency laptop display rule (tries multiple common identifiers)
monitor=LVDS-1,preferred,auto,1.0

# Let Kanshi handle the dynamic switching logic
# MANAGED BY SYSTEMD: kanshi.service (enabled in systemd user services)
# DO NOT exec-once here - it's already running via systemd

