# Monitor Configuration - Argonaut Desktop
# Signal path: RTX 3080 → Onkyo TX-NR585 AVR → Sony Bravia 8

# Onkyo TX-NR585 AVR - 4K@60Hz, scale 2.0, 10-bit color
# Single monitorv2 block: monitorv2 overrides any monitor= line for the same
# output and resets unspecified fields to defaults (scale would drop to 1.0).
# sdrsaturation < 1.0 reduces oversaturation from full/limited RGB range mismatch.
monitorv2 {
    output = desc:ONKYO Corporation AV Receiver
    mode = 3840x2160@60
    position = auto
    scale = 2.0
    bitdepth = 10
    sdrsaturation = 0.75
}

# LG ULTRAGEAR 1440p@120Hz on DP-1, VRR enabled
monitor = desc:LG Electronics LG ULTRAGEAR 407NTNH69143, 2560x1440@120, auto, 1.0, vrr, 1

# Fallback for any other monitor
monitor = , preferred, auto, 1.0
