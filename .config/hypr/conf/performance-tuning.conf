# Advanced performance optimizations for laptop use
# Updated for Hyprland 0.52+ (2025-11-16)

# Memory management
misc {
	vrr = 1       # Variable refresh rate when supported

	# Background application handling
	allow_session_lock_restore = true
}

debug {
	vfr = true
}

# Advanced rendering settings
render {
	# Explicit sync always on as of 0.50.0
	# Render ahead of time removed as of 0.50.0
	# new_render_scheduling = true # experimental triple buffering, new with 0.50.0

	# Direct scanout for fullscreen applications (videos, games)
	direct_scanout = true

	# Hyprland 0.52+ color management options (uncomment if needed)
	# non_shader_cm = false  # Default: uses shaders for color management (better quality)
	# non_shader_cm = true   # May help with specific edge cases or compatibility issues

	# New color profiles available in 0.52: dcip3, dp3, adobe
	# Configure via hyprctl if working with color-critical applications
}

