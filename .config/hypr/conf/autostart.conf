#==========================================================#
#                    AUTOSTART SEQUENCE                    #
#==========================================================#
# 2025-11-16

#============= PHASE 1: CRITICAL SYSTEM SERVICES ========#
# Services that must start first and have no dependencies
# Use 'uwsm app --' for proper session integration

# File system integration
exec-once = [workspace special:bg silent] uwsm app -- udiskie --automount --notify --file-manager nautilus

# NOTE: swaync is now managed via systemd service
# DO NOT start notification daemons here to avoid conflicts
# swaync.service will handle:
# - Stopping conflicting daemons (mako, dunst)
# - Setting up proper dconf environment
# - Starting swaync with correct permissions
 
#============= PHASE 2: ESSENTIAL USER SERVICES =========#
# Services that enhance the desktop experience
# Delay slightly to ensure compositor is fully ready

# Clipboard manager
exec-once = sleep 1 && [workspace special:bg silent] uwsm app -- clipse -listen

# Wayland/Pipewire idle inhibit (prevent idle during audio playback)
exec-once = sleep 1 && uwsm app -- wayland-pipewire-idle-inhibit

# Display management for hotplug events
# MANAGED BY SYSTEMD: kanshi.service (WantedBy=wayland-session@hyprland.desktop.target)
# DO NOT start here to avoid duplicate instances

# Foot server
# REPLACED by systemd service: exec-once = sleep 1 && uwsm app -- foot --server

# UPDATED: Foot server now managed via systemd for better reliability
exec-once = sleep 1 && systemctl --user start foot-server.service

#============= PHASE 3: USER INTERFACE COMPONENTS =======#
# UI components that users interact with directly
# Longer delay to ensure system services are ready

# Waybar is managed by systemd, to prevent duplicate instances

# Wallpaper service (swaybg via systemd — hyprpaper broken with Hyprland 0.54.2)

# Hyprsunset service
exec-once = sleep 2 && uwsm app -- hyprsunset

# GTK theme synchronization
exec-once = sleep 2 && ~/.config/hypr/scripts/runtime/gtk_sync.sh

# Waybar workspace visibility toggle (hide on workspace 10 for Moonlight)
exec-once = sleep 3 && ~/.config/hypr/scripts/system/monitoring/waybar_workspace_toggle.sh

#============= PHASE 4: APPLICATIONS ===================#
# User applications - start with longer delay
# These are not critical for system operation

# Terminal for immediate user access
exec-once = sleep 3 && uwsm app -- footclient

#============= PHASE 5: OPTIMIZATION SCRIPTS ============#
# Background optimization tasks
# Run these last to avoid interfering with startup

# Process optimization (now managed by systemd timer)
exec-once = sleep 5 && systemctl --user start process-optimization.timer

#============= PHASE 6: SYSTEMD SERVICE INTEGRATION ====#
# Ensure systemd user services are properly managed
# This should be the last step

exec-once = sleep 8 && ~/.config/hypr/scripts/runtime/systemd_integration.sh

#==========================================================#
# Notes:
# 1. All applications use 'uwsm app --' for proper session management
# 2. Progressive delays prevent resource contention during startup
# 3. Critical services start first, user applications last
# 4. Background tasks are given lowest priority
# 5. [workspace special:bg silent] hides non-interactive services
#==========================================================#

# ADDED: Foot server health monitoring
exec-once = sleep 10 && ~/.config/hypr/scripts/runtime/foot_uwsm_monitor.sh --daemon
