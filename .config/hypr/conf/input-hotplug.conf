# ~/.config/hypr/conf/input-hotplug.conf
# Enhanced input configuration for USB hotplug scenarios
# Documentation: https://wiki.hyprland.org/Configuring/Variables/#input
# Hyprland Version: 0.45.0+

input {
    # Keyboard configuration
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    numlock_by_default = true
    
    # Mouse and general input settings
    follow_mouse = 1
    mouse_refocus = false
    float_switch_override_focus = 2
    
    # Natural scrolling for touchpad (laptop)
    touchpad {
        natural_scroll = true
        scroll_factor = 1.0
        clickfinger_behavior = false
        middle_button_emulation = true
        tap-to-click = false
        drag_lock = false
        disable_while_typing = false
    }
    
    # Mouse sensitivity (applies to all mice)
    sensitivity = 0.0
    accel_profile = adaptive
    force_no_accel = false
}

# Device-specific configurations for hotplug scenarios
# These apply when specific devices are detected

# Built-in laptop keyboard (always present)
device {
    name = at-translated-set-2-keyboard
    kb_layout = us
    numlock_by_default = true
    repeat_rate = 30
    repeat_delay = 300
}

# Built-in touchpad (always present)
device {
    name = elan0651:00-04f3:3140-touchpad
    sensitivity = 0.0
    natural_scroll = true
    tap-to-click = true
    disable_while_typing = true
    clickfinger_behavior = true
    scroll_method = 2fg
}

# External USB keyboards (hotplug)
# This configuration applies to any external USB keyboard
device {
    name = usb-*-keyboard
    kb_layout = us
    numlock_by_default = true
    repeat_rate = 35
    repeat_delay = 250
}

# External USB mice (hotplug)
# This configuration applies to any external USB mouse
device {
    name = usb-*-mouse
    sensitivity = -0.3
    accel_profile = flat
    natural_scroll = false
    scroll_method = no_scroll_wheel
}

# Specific configuration for common USB input devices
# Add your specific devices here if you know their names

# Generic USB HID devices (common for USB-C hubs)
device {
    name = generic-usb-keyboard
    kb_layout = us
    numlock_by_default = true
}

device {
    name = generic-usb-mouse  
    sensitivity = -0.2
    accel_profile = flat
}

# Keybinds for input device debugging and management
# These help troubleshoot input issues
bind = SUPER SHIFT, I, exec, hyprctl devices | grep -E "(Keyboards|Mice)" | head -20 | notify-send "Input Devices" "$(cat)"
bind = SUPER SHIFT CTRL, I, exec, ~/.config/hypr/scripts/debug/usb_input_handler.sh status

# Monitor input events for debugging (remove in production)
# exec-once = ~/.config/hypr/scripts/monitor_input_events.sh
