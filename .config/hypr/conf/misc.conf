# -----------------------------------------------------
# Misc settings
# -----------------------------------------------------

misc {
    disable_hyprland_logo = true
    col.splash = 0x665c54
    splash_font_family = Iosevka NF Propo
    force_default_wallpaper = 0 # -1 = random defaults, 0/1 = disable anime, 2 = specific wallpaper

    # IDE focus improvements
    focus_on_activate = false           # Prevent background apps from stealing focus
    mouse_move_enables_dpms = false     # Prevent unwanted screen wake
    key_press_enables_dpms = false      # More predictable behavior

    # Animation improvements for popups
    animate_manual_resizes = false      # Reduces flickering during popup resize
    animate_mouse_windowdragging = false # Smoother window management

    # Stability: Track workspace state across sessions (from ML4W)
    initial_workspace_tracking = 1      # Helps prevent workspace confusion on reconnect
}

ecosystem {
    no_donation_nag = true
}

xwayland {
    force_zero_scaling = true
}

# Hyprland 0.52+ cursor options
# Uncomment cursor zoom bindings in keybinding.conf to use
cursor {
    # Control zoom appearance (Hyprland 0.52+)
    # zoom_disable_aa = true   # Pixelated zoom (faster, sharper for reading text)
    # zoom_disable_aa = false  # Blurred zoom (smoother, default)
}
