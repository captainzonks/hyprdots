# ~/.config/hypr/conf/gamepad-input.conf
# Xbox One controller input configuration for Hyprland
# Documentation: https://wiki.hyprland.org/Configuring/Variables/#input
# Hyprland Version: 0.50.0+
# Last Updated: 2025-08-02

#============= GAMEPAD INPUT CONFIGURATION ================#
# Xbox One controller support for Hyprland
# These settings ensure proper controller detection and functionality

input {
    # Enable gamepad support
    follow_mouse = 1
    mouse_refocus = false
    
    # Gamepad-specific settings
    force_no_accel = false
    accel_profile = adaptive
    
    # Sensitivity for gamepad analog stick mouse emulation (if needed)
    sensitivity = 0.0
}

# Device-specific configuration for Xbox controllers
# Xbox One S Controller (Bluetooth)
device {
    name = Microsoft X-Box One S pad
    enabled = true
    # Prevent controller from acting as mouse by default
    # (games should handle controller input directly)
    natural_scroll = false
    disable_while_typing = false
}

# Xbox Series X|S Controller (Bluetooth)
device {
    name = Xbox Wireless Controller
    enabled = true
    natural_scroll = false
    disable_while_typing = false
}

# Xbox Elite Controller (if you have one)
device {
    name = Microsoft X-Box One Elite pad
    enabled = true
    natural_scroll = false
    disable_while_typing = false
}

#============= GAMEPAD DEBUGGING KEYBINDS ================#
# Useful keybinds for troubleshooting gamepad issues
# Remove these after your controller is working properly

# Show connected input devices
bind = SUPER SHIFT, G, exec, hyprctl devices | grep -E "(Keyboards|Mice|Tablet|Touch|Switch)" | notify-send "Input Devices" "$(cat)"

# List gamepad devices
bind = SUPER SHIFT ALT, G, exec, ls /dev/input/js* /dev/input/event* 2>/dev/null | head -10 | notify-send "Gamepad Devices" "$(cat)"

# Show current controller battery (if xpadneo is working)
bind = SUPER SHIFT CTRL, G, exec, cat /sys/class/power_supply/xbox_controller_battery_*/capacity 2>/dev/null | head -1 | xargs -I {} notify-send "Controller Battery" "{}%" || notify-send "Controller Battery" "No controller detected"

#============= GAMEPAD APPLICATION BINDINGS ==============#
# Optional: Bind controller connection to launch Steam Big Picture
# bind = , XF86GamePad, exec, uwsm app -- steam -gamepadui

# Alternative: Launch gamepad-friendly applications
# bind = SUPER, XF86GamePad, exec, uwsm app -- steam
# bind = SUPER SHIFT, XF86GamePad, exec, uwsm app -- retroarch

#============= POWER MANAGEMENT =========================#
# Gamepad power management through systemd/logind
# Controllers will auto-sleep after idle timeout (configured in Bluetooth)

# Optional: Manual controller disconnect
# bind = SUPER CTRL, XF86GamePad, exec, bluetoothctl disconnect $XBOX_CONTROLLER_MAC

#============= NOTES ====================================#
# Controller device names may vary:
# - "Microsoft X-Box One S pad" (Xbox One S over Bluetooth)
# - "Xbox Wireless Controller" (Xbox Series X|S over Bluetooth)  
# - "Microsoft X-Box One pad" (Xbox One over USB)
# 
# Use 'hyprctl devices' to see exact names of connected devices
#
# For game compatibility, most modern games detect controllers
# automatically through:
# - SDL2 (Steam, most indie games)
# - DirectInput (Windows games via Proton)
# - XInput (Windows games via Proton)
#
# xpadneo provides proper Linux gamepad API support
