# Gamepad Input - Xbox Controller Support

input {
    follow_mouse = 1
    mouse_refocus = false
    force_no_accel = false
    accel_profile = adaptive
    sensitivity = 0.0
}

# Xbox One S Controller (Bluetooth)
device {
    name = Microsoft X-Box One S pad
    enabled = true
    natural_scroll = false
    disable_while_typing = false
}

# Xbox Series X|S Controller (Bluetooth)
device {
    name = Xbox Wireless Controller
    enabled = true
    natural_scroll = false
    disable_while_typing = false
}

# Xbox Elite Controller
device {
    name = Microsoft X-Box One Elite pad
    enabled = true
    natural_scroll = false
    disable_while_typing = false
}
