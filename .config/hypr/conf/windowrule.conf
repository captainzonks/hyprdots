#==========================================================#
#                WINDOW RULES CONFIGURATION                #
#==========================================================#
# File: windowrule.conf
# Purpose: Window rules
# Last Updated: 2026-01-23 (Migrated to Hyprland v0.53.0+ syntax)
# Documentation: https://wiki.hypr.land/Configuring/Window-Rules/
#==========================================================#

#============== GLOBAL MODAL DIALOG RULES ================#
# Purpose: Handle modal dialogs from all applications (Hyprland 0.53+)
# Modal dialogs are confirmation windows, preferences, alerts, etc.
windowrule = match:modal 1, float = true, center = true, stay_focused = true, pin = true

#============== APPLICATION-SPECIFIC RULES ===============#
# Specific suppress rules for apps that misbehave with maximize
windowrule = match:class ^(discord)$, suppress_event maximize
windowrule = match:class ^(signal)$, suppress_event maximize
windowrule = match:class ^(steam)$, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus = true

# idleinhibit
windowrule = match:class ^(.*window.*)$, idle_inhibit fullscreen  # Available modes: none, always, focus, fullscreen

# Alt Tab
windowrule = match:class ^(alttab)$, animation none, stay_focused = true, workspace special:alttab, border_size 0

#---------------- BITWARDEN -------------------------------#
windowrule = match:class ^(Bitwarden)$, float = true, size 1200 800, center = true

#---------------- BLUEMAN ---------------------------------#
windowrule = match:class ^(blueman-manager)$, float = true, size 800 600, center = true

#---------------- CALCULATOR ------------------------------#
windowrule = match:class ^(org\.gnome\.Calculator)$, float = true, move 100%-w-16 66, pin = true, size 400 400, center = true

#---------------- CALENDAR --------------------------------#
windowrule = match:class ^(org\.gnome\.Calendar)$, float = true, move 100%-w-16 66, pin = true, size 400 400, center = true

#---------------- CLAUDE ----------------------------------#
windowrule = match:class ^(claude-nativefier-.*)$, float = true, size 500 50%, move 20 70

#---------------- CLIPSE ----------------------------------#
windowrule = match:class ^(clipse)$, float = true, size 622 652, stay_focused = true

#---------------- FIREFOX ---------------------------------#
# Firefox - main windows tile by default
windowrule = match:class ^(firefox)$, tile = true

# Allow Firefox popups and context menus to float
windowrule = match:class ^(firefox)$, match:title (.*Firefox.*), match:float 1, float = true
windowrule = match:class ^(firefox)$, match:title (.*Context Menu.*), float = true
windowrule = match:class ^(firefox)$, match:title (.*Popup.*), float = true

# Keep existing Firefox rules - Picture in Picture
windowrule = match:title ^(Picture-in-Picture)$, float = true, pin = true, move 69.5% 4%

#---------------- HYPRLAND SHARE PICKER -------------------#
windowrule = match:class ^(hyprland-share-picker)$, float = true, pin = true, center = true, size 600 400

#============== JETBRAINS IDEs FOCUS FIX ==============
# Purpose: Fix focus flickering and popup issues in RustRover and other JetBrains IDEs
# Documentation: https://wiki.hypr.land/Configuring/Window-Rules/
# Updated: 2026-01-23 for Hyprland 0.53.0+
# Note: Based on community solutions from Omarchy project

# Tag all JetBrains floating dialogs for group management
windowrule = match:class ^jetbrains-.+$, match:float 1, tag +jetbrains_dialog
windowrule = match:class ^(RustRover)$, match:float 1, tag +jetbrains_dialog

# Keep dialogs focused and prevent focus stealing
windowrule = match:tag jetbrains_dialog, stay_focused = true, no_initial_focus = true

# Enable focus on activate for main windows (prevents loss of focus)
windowrule = match:class ^jetbrains-.+$, focus_on_activate = true
windowrule = match:class ^(RustRover)$, focus_on_activate = true

# Center and size dialog windows (excluding context menus)
# Note: Removed title filter due to RE2 regex limitations. Tooltips (win.*) are handled separately below.
windowrule = match:class ^jetbrains-.+$, match:float 1, move 30% 30%, size 40% 40%
windowrule = match:class ^(RustRover)$, match:float 1, move 30% 30%, size 40% 40%

# Fix tooltips and autocomplete popups (titles start with "win")
windowrule = match:class ^(.*jetbrains.*)$, match:title ^(win.*)$, no_initial_focus = true, no_focus = true
windowrule = match:class ^(RustRover)$, match:title ^(win.*)$, no_initial_focus = true, no_focus = true

# Fix tab dragging (single space character titles)
windowrule = match:class ^(.*jetbrains.*)$, match:title ^\\s$, no_initial_focus = true, no_focus = true
windowrule = match:class ^(RustRover)$, match:title ^\\s$, no_initial_focus = true, no_focus = true

# Suppress specific events that cause flickering
windowrule = match:class ^(.*jetbrains.*)$, suppress_event maximize
windowrule = match:class ^(RustRover)$, suppress_event maximize

#---------------- MISSION CENTER --------------------------#
# Mission Center
windowrule = match:class ^(io\.missioncenter\.MissionCenter)$, float = true, pin = true, center = true, size 900 600

# Preferences
windowrule = match:class ^(missioncenter)$, match:title ^(Preferences)$, float = true, pin = true, center = true

#---------------- MOONLIGHT -------------------------------#
# Stream
# Removed fullscreen and stayfocused to allow window movement and multi-monitor usage
windowrule = match:title ^(Argonaut - Moonlight)$, immediate = true, opacity 1.0 override, border_size 0, no_shadow = true, no_blur = true, rounding 0, tag game, idle_inhibit always, suppress_event maximize, suppress_event fullscreen, workspace 10

# Launcher
windowrule = match:title ^(Moonlight)$, float = true

#---------------- PAVUCONTROL -----------------------------#
windowrule = match:class (.*com\.saivert\.pwvucontrol.*), tile = true, center = true, pin = true
# windowrule = match:class (.*com\.saivert\.pwvucontrol.*), size 700 600

#---------------- SIGNAL ----------------------------------#
# Signal [Main]
windowrule = match:class ^(Signal)$, match:title ^(Signal)$, tile = true, opacity 1.0 override

# Signal [Wayland-specific rules]
windowrule = match:class ^(Signal)$, match:title (Signal.*Loading.*), float = true, center = true, size 400 300, pin = true

#---------------- SWAYNC (NOTIFICATION CENTER) ------------#
# Control center window
windowrule = match:class ^(swaync-control-center)$, float = true, pin = true, stay_focused = true, size 380 600, move 100%-390 50

# Floating notifications
windowrule = match:class ^(swaync-notification-window)$, float = true, pin = true, no_focus = true, no_shadow = true, move 100%-390 50

#---------------- VS CODE ---------------------------------#
windowrule = match:class ^(code)$, immediate = true, opacity 1.0 override

#---------------- WAYPAPER --------------------------------#
windowrule = match:class (.*waypaper.*), float = true, size 900 700, center = true, pin = true

#---------------- WEBCORD ---------------------------------#
windowrule = match:class ^(WebCord)$, immediate = true, opacity 1.0 override, tile = true
