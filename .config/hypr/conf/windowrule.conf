# Window Rules Configuration - Argonaut Desktop
# Migrated from niri + Spartan JetBrains/Steam rules

#============== GLOBAL MODAL DIALOG RULES ================#
windowrule = match:modal 1, float = true, center = true, stay_focused = true, pin = true

#============== APPLICATION-SPECIFIC RULES ===============#
windowrule = match:class ^(discord)$, suppress_event maximize
windowrule = match:class ^(signal)$, suppress_event maximize
windowrule = match:class ^(steam)$, suppress_event maximize

# XWayland drag fix
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus = true

# Idle inhibit for fullscreen
windowrule = match:class ^(.*window.*)$, idle_inhibit fullscreen

# Alt Tab
windowrule = match:class ^(alttab)$, animation none, stay_focused = true, workspace special:alttab, border_size 0

#---------------- BITWARDEN -------------------------------#
windowrule = match:class ^(Bitwarden)$, float = true, size 1200 800, center = true

#---------------- BLUEMAN ---------------------------------#
windowrule = match:class ^(blueman-manager)$, float = true, size 800 600, center = true

#---------------- CALCULATOR ------------------------------#
windowrule = match:class ^(org\.gnome\.Calculator)$, float = true, pin = true, size 400 400, center = true

#---------------- CLIPSE ----------------------------------#
windowrule = match:class ^(clipse)$, float = true, size 622 652, stay_focused = true

#---------------- FIREFOX ---------------------------------#
windowrule = match:class ^(firefox)$, tile = true
windowrule = match:class ^(firefox)$, match:title (.*Firefox.*), match:float 1, float = true
windowrule = match:class ^(firefox)$, match:title (.*Context Menu.*), float = true
windowrule = match:class ^(firefox)$, match:title (.*Popup.*), float = true
windowrule = match:title ^(Picture-in-Picture)$, float = true, pin = true, move 69.5% 4%

#---------------- HYPRLAND SHARE PICKER -------------------#
windowrule = match:class ^(hyprland-share-picker)$, float = true, pin = true, center = true, size 600 400

#============== STEAM RULES ===============================#
# Steam main window - keep floating for proper popup behavior
windowrule = match:class ^(steam)$, match:title ^(Steam)$, float = true

# Steam Big Picture / game windows
windowrule = match:class ^(steam)$, match:title ^(Steam Big Picture Mode)$, fullscreen = true, immediate = true
windowrule = match:class ^(steam_app_.*)$, immediate = true, idle_inhibit always

# Steam popups / dialogs
windowrule = match:class ^(steam)$, match:title ^(Friends List)$, float = true, size 400 600
windowrule = match:class ^(steam)$, match:title ^(Steam Settings)$, float = true, center = true

#============== JETBRAINS IDEs ============================#
windowrule = match:class ^jetbrains-.+$, match:float 1, tag +jetbrains_dialog
windowrule = match:class ^(RustRover)$, match:float 1, tag +jetbrains_dialog

windowrule = match:tag jetbrains_dialog, stay_focused = true, no_initial_focus = true

windowrule = match:class ^jetbrains-.+$, focus_on_activate = true
windowrule = match:class ^(RustRover)$, focus_on_activate = true

windowrule = match:class ^jetbrains-.+$, match:float 1, move 30% 30%, size 40% 40%
windowrule = match:class ^(RustRover)$, match:float 1, move 30% 30%, size 40% 40%

windowrule = match:class ^(.*jetbrains.*)$, match:title ^(win.*)$, no_initial_focus = true, no_focus = true
windowrule = match:class ^(RustRover)$, match:title ^(win.*)$, no_initial_focus = true, no_focus = true

windowrule = match:class ^(.*jetbrains.*)$, match:title ^\\s$, no_initial_focus = true, no_focus = true
windowrule = match:class ^(RustRover)$, match:title ^\\s$, no_initial_focus = true, no_focus = true

windowrule = match:class ^(.*jetbrains.*)$, suppress_event maximize
windowrule = match:class ^(RustRover)$, suppress_event maximize

#---------------- PAVUCONTROL -----------------------------#
windowrule = match:class (.*com\.saivert\.pwvucontrol.*), tile = true, center = true, pin = true

#---------------- WAYPAPER --------------------------------#
windowrule = match:class (.*waypaper.*), float = true, size 900 700, center = true, pin = true
