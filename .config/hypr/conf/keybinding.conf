#==========================================================#
#                 KEYBINDING CONFIGURATION                 #
#==========================================================#
# File: keybinding.conf
# Purpose: All key bindings for Hyprland
# Last Updated: 2025-07-18
# Documentation: https://wiki.hyprland.org/Configuring/Binds/
#==========================================================#
 
#================ VARIABLES ===================# 

$uwsm = uwsm app --
$terminal = footclient
$fileManager = nautilus
$menu = rofi -show drun -run-command "uwsm app -- {cmd}"
$screencapregion = hyprshot -m region -z
$screencapwindow = hyprshot -m window -m active -z

#================ GENERAL =====================#
# ----- System
# $mainMod = ALT
$mainMod = SUPER
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill  # Kill all instances of active window
# bind = $mainMod, M, exit, # default - replaced with power.sh
bind = $mainMod CTRL, M, exec, ~/.config/hypr/scripts/runtime/power.sh exit  # Changed to CTRL+M to avoid maximize conflict
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/runtime/power.sh shutdown

# ----- Configuration Management
bind = $mainMod CTRL, R, exec, hyprctl reload  # Reload Hyprland configuration

# ----- Application Shortcuts
bind = $mainMod, Q, exec, $uwsm $terminal
bind = $mainMod, B, exec, firefox  # Open browser
bind = $mainMod, E, exec, $uwsm $fileManager
bind = $mainMod, R, exec, $uwsm $menu

#================ WINDOWS & WORKSPACED ========#
# ----- Window Behaviors
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, T, workspaceopt, allfloat  # Toggle all windows floating
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, 0, toggle  # Fullscreen (Hyprland 0.52+ explicit toggle)
bind = $mainMod, M, fullscreen, 1, toggle  # Maximize (keep borders visible)
bind = $mainMod, G, togglegroup  # Toggle window grouping (tabs)
# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ----- Focus Behaviors
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ----- Window Resizing
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, down, resizeactive, 0 100

# ----- Window Swapping
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d
bind = $mainMod ALT, H, swapwindow, l
bind = $mainMod ALT, L, swapwindow, r
bind = $mainMod ALT, K, swapwindow, u
bind = $mainMod ALT, J, swapwindow, d

# ----- Workspaces
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ----- Multi-Monitor Management
# Focus monitors - Use bracket keys to cycle through monitors
# https://wiki.hyprland.org/Configuring/Binds/#monitor-focus
bind = $mainMod, bracketleft, focusmonitor, -1   # Focus previous monitor (cycle left)
bind = $mainMod, bracketright, focusmonitor, +1  # Focus next monitor (cycle right)

# Move active window to monitor - CTRL + brackets
# Window follows to the target monitor's active workspace
bind = $mainMod CTRL, bracketleft, movewindow, mon:-1   # Move window to previous monitor
bind = $mainMod CTRL, bracketright, movewindow, mon:+1  # Move window to next monitor

# Move workspace to different monitor - SHIFT + brackets
# Entire workspace (with all windows) moves to target monitor
bind = $mainMod SHIFT, bracketleft, movecurrentworkspacetomonitor, -1   # Move workspace to previous monitor
bind = $mainMod SHIFT, bracketright, movecurrentworkspacetomonitor, +1  # Move workspace to next monitor

# Swap active workspace with workspace on target monitor - ALT + brackets
# Useful for quickly reorganizing multi-monitor layouts
bind = $mainMod ALT, bracketleft, swapactiveworkspaces, current, -1   # Swap with previous monitor
bind = $mainMod ALT, bracketright, swapactiveworkspaces, current, +1  # Swap with next monitor

#================ KEYBOARD ====================#
# ----- Function Keys
bind = $mainMod, F9, exec, ~/.config/hypr/scripts/utilities/toggle_animations.sh  # Toggle animations
bind = $mainMod, F10, exec, ~/.config/hypr/scripts/utilities/gamemode.sh # Game Mode (Performance)
bind = $mainMod, F12, exec, ~/.config/hypr/scripts/runtime/set_random_wallpaper.sh  # Change wallpaper and regenerate colors

# ----- Function + Shift Keys
# System monitoring shortcuts
bind = $mainMod SHIFT, F1, exec, $uwsm $terminal -e ~/.config/hypr/scripts/system/diagnostics/usbc_pd_monitor.sh --hardware
bind = $mainMod SHIFT, F2, exec, $uwsm $terminal -e ~/.config/hypr/scripts/system/diagnostics/system_crash_fix.sh
bind = $mainMod SHIFT, F3, exec, $uwsm $terminal -e ~/.config/hypr/scripts/system/diagnostics/system_maintenance.sh
# Quick system status
bind = $mainMod SHIFT, F4, exec, ~/.config/hypr/scripts/system/monitoring/swaync_system_alerts.sh test
# Open system logs
bind = $mainMod SHIFT, F5, exec, $uwsm $terminal -e journalctl -f -p err
# Temperature monitoring
bind = $mainMod SHIFT, F6, exec, notify-send "System Temperature" "$(sensors 2>/dev/null | head -10)"
# System resource monitoring
bind = $mainMod SHIFT, F7, exec, $uwsm $terminal -e htop
bind = $mainMod SHIFT, F8, exec, $uwsm $terminal -e iostat -x 1

# ----- Laptop Control Keys
# Audio
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# WiFi toggle (F8 on most laptops)
bindl = ,XF86WLAN, exec, ~/.config/hypr/scripts/utilities/wifi_toggle.sh

# ----- Zoom
# Not sure what bindings to use for this right now that don't conflict
# bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
# bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')

# binde = $mainMod, equal, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
# binde = $mainMod, minus, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')
# binde = $mainMod, KP_ADD, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
# binde = $mainMod, KP_SUBTRACT, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')

