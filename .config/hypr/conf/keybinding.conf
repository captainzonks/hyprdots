#================ MOUSE =======================#
# ----- Navigation
# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#================ SCRIPTS =====================#
# ----- Alt Tab
bind = ALT, TAB, exec, $HOME/.config/hypr/scripts/utilities/alttab/enable.sh 'down'
bind = ALT SHIFT, TAB, exec, $HOME/.config/hypr/scripts/utilities/alttab/enable.sh 'up'

submap = alttab
bind = ALT, tab, sendshortcut, , tab, class:alttab
bind = ALT SHIFT, tab, sendshortcut, shift, tab, class:alttab

bindrt = ALT, ALT_L, exec, $XDG_CONFIG_HOME/hypr/scripts/utilities/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return,class:alttab
bindrt = ALT SHIFT, ALT_L, exec, $XDG_CONFIG_HOME/hypr/scripts/utilities/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return,class:alttab
bind = ALT, Return, exec, $XDG_CONFIG_HOME/hypr/scripts/utilities/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return, class:alttab
bind = ALT SHIFT, Return, exec, $XDG_CONFIG_HOME/hypr/scripts/utilities/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , return, class:alttab
bind = ALT, escape, exec, $XDG_CONFIG_HOME/hypr/scripts/utilities/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , escape,class:alttab
bind = ALT SHIFT, escape, exec, $XDG_CONFIG_HOME/hypr/scripts/utilities/alttab/disable.sh ; hyprctl -q dispatch sendshortcut , escape,class:alttab
submap = reset

#================ APPLICATIONS ================#
# ----- Waybar (Caps Lock Icon Script)
bindirt = , Caps_Lock, exec, pkill -SIGRTMIN+1 waybar

# ----- Clipse
bind = $mainMod SHIFT, V, exec, uwsm app -- foot --app-id clipse -e 'clipse'

# ----- Hyprshot
bind = $mainMod, F1, exec, $screencapregion 
bind = $mainMod CONTROL, F1, exec, $screencapwindow

# ----- Playerctl
# bindl = , XF86AudioNext, exec, playerctl next
# bindl = , XF86AudioPause, exec, playerctl play-pause
# bindl = , XF86AudioPlay, exec, playerctl play-pause
# bindl = , XF86AudioPrev, exec, playerctl previous

# ----- Swaync

#================ IDE FOCUS MANAGEMENT ================#
# Emergency focus fix for JetBrains IDEs
bind = $mainMod SHIFT, F, exec, ~/.config/hypr/scripts/utilities/fix_ide_focus.sh reload
bind = $mainMod SHIFT CTRL, F, exec, ~/.config/hypr/scripts/utilities/fix_ide_focus.sh status

#=============================================================================
# CORE NOTIFICATION CONTROLS
#=============================================================================

# Toggle notification control center
# SUPER+SHIFT+N - Main notification interface
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw

# Toggle Do Not Disturb mode  
# SUPER+SHIFT+D - Quick DND toggle for focus sessions
bind = $mainMod SHIFT, D, exec, swaync-client -d -sw

# Clear all notifications
# SUPER+SHIFT+C - Clean slate for focused work
bind = $mainMod SHIFT, C, exec, swaync-client -C -sw

#=============================================================================
# ADVANCED NOTIFICATION MANAGEMENT
#=============================================================================

# Close latest notification (quick dismiss)
# SUPER+CTRL+N - Dismiss without opening control center
bind = $mainMod CTRL, N, exec, swaync-client --close-latest

# Show notification count
# SUPER+ALT+N - Quick status check via temporary notification
bind = $mainMod ALT, N, exec, notify-send "Notifications" "Count: $(swaync-client --count)" -t 2000

# Toggle inhibitors (for presentations/screenshare)
# SUPER+ALT+D - Advanced DND with inhibitor management
bind = $mainMod ALT, D, exec, swaync-client --inhibitor-toggle "manual"

#=============================================================================
# CONFIGURATION AND SERVICE MANAGEMENT
#=============================================================================

# Restart swaync service (troubleshooting)
# SUPER+ALT+SHIFT+N - Full service restart
bind = $mainMod ALT SHIFT, N, exec, systemctl --user restart swaync.service

#=============================================================================
# MOUSE INTEGRATION (Optional)
#=============================================================================

# Right-click waybar notification area to toggle DND
# (Requires waybar configuration update)
# This is handled in waybar config: "on-click-right": "swaync-client -d -sw"

# Emergency foot recovery bindings (added by UWSM integration)
# bind = $mainMod SHIFT, T, exec, systemctl --user restart foot-server.service
bind = $mainMod CTRL SHIFT, T, exec, ~/.config/hypr/scripts/runtime/foot_uwsm_monitor.sh --restart
bind = $mainMod ALT, Q, exec, foot # Direct foot fallback
