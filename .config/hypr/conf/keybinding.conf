# Keybinding Configuration - Argonaut Desktop
# Adapted from Spartan (no brightness, no wifi, no USB-C)

#================ VARIABLES ====================#

$uwsm = uwsm app --
$terminal = footclient
$fileManager = nautilus
$menu = rofi -show drun -run-command "uwsm app -- {cmd}"
$screencapregion = hyprshot -m region -z
$screencapwindow = hyprshot -m window -m active -z

#================ GENERAL ======================#
$mainMod = SUPER

# System
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill
bind = $mainMod CTRL, M, exec, ~/.config/hypr/scripts/runtime/power.sh exit
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/runtime/power.sh shutdown

# Configuration
bind = $mainMod CTRL, R, exec, hyprctl reload

# Applications
bind = $mainMod, Q, exec, $uwsm $terminal
bind = $mainMod, B, exec, firefox
bind = $mainMod, E, exec, $uwsm $fileManager
bind = $mainMod, R, exec, $uwsm $menu

#================ WINDOWS & WORKSPACES =========#

# Window Behaviors
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, T, workspaceopt, allfloat
bind = $mainMod, F, fullscreen, 0, toggle
bind = $mainMod, M, fullscreen, 1, toggle
bind = $mainMod, G, togglegroup

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Focus (vim + arrows)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, down, resizeactive, 0 100

# Swap
bind = $mainMod ALT, left, swapwindow, l
bind = $mainMod ALT, right, swapwindow, r
bind = $mainMod ALT, up, swapwindow, u
bind = $mainMod ALT, down, swapwindow, d
bind = $mainMod ALT, H, swapwindow, l
bind = $mainMod ALT, L, swapwindow, r
bind = $mainMod ALT, K, swapwindow, u
bind = $mainMod ALT, J, swapwindow, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Multi-Monitor (for future dual monitor)
bind = $mainMod, bracketleft, focusmonitor, -1
bind = $mainMod, bracketright, focusmonitor, +1
bind = $mainMod CTRL, bracketleft, movewindow, mon:-1
bind = $mainMod CTRL, bracketright, movewindow, mon:+1
bind = $mainMod SHIFT, bracketleft, movecurrentworkspacetomonitor, -1
bind = $mainMod SHIFT, bracketright, movecurrentworkspacetomonitor, +1
bind = $mainMod ALT, bracketleft, swapactiveworkspaces, current, -1
bind = $mainMod ALT, bracketright, swapactiveworkspaces, current, +1

#================ FUNCTION KEYS ================#

bind = $mainMod, F9, exec, ~/.config/hypr/scripts/utilities/toggle_animations.sh
bind = $mainMod, F10, exec, ~/.config/hypr/scripts/utilities/gamemode.sh

#================ MEDIA KEYS ===================#

# Audio
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

#================ MOUSE =======================#

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#================ APPLICATIONS ================#

# Caps Lock signal to waybar
bindirt = , Caps_Lock, exec, pkill -SIGRTMIN+1 waybar

# Cursor-clip clipboard
bind = $mainMod SHIFT, V, exec, uwsm app -- cursor-clip

# Screenshots
bind = $mainMod, F1, exec, $screencapregion
bind = $mainMod CONTROL, F1, exec, $screencapwindow

# JetBrains IDE focus fix
bind = $mainMod SHIFT, F, exec, ~/.config/hypr/scripts/utilities/fix_ide_focus.sh reload
bind = $mainMod SHIFT CTRL, F, exec, ~/.config/hypr/scripts/utilities/fix_ide_focus.sh status

#================ SWAYNC ======================#

bind = $mainMod SHIFT, N, exec, swaync-client -t -sw
bind = $mainMod SHIFT, D, exec, swaync-client -d -sw
bind = $mainMod SHIFT, C, exec, swaync-client -C -sw
bind = $mainMod CTRL, N, exec, swaync-client --close-latest
bind = $mainMod ALT, N, exec, notify-send "Notifications" "Count: $(swaync-client --count)" -t 2000
bind = $mainMod ALT, D, exec, swaync-client --inhibitor-toggle "manual"
bind = $mainMod ALT SHIFT, N, exec, systemctl --user restart swaync.service

#================ POWER ========================#

bind = $mainMod ALT, Q, exec, foot
