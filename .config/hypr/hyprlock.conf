# Hyprlock Configuration - Argonaut Desktop (Gruvbox)

source = ~/.config/hypr/hyprlock-colors.conf

# BACKGROUND
background {
    monitor =
    path = ~/Pictures/Wallpapers/3840x2160-dark-archlinux2.png
    color = $background
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# TIME
label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 120
    font_family = Iosevka Nerd Font Propo
    position = 0, -140
    halign = center
    valign = top
}

# DAY-DATE-MONTH
label {
    monitor =
    text = cmd[update:43200] date '+%A, %d %B'
    color = $on_background
    font_size = 30
    font_family = Iosevka Nerd Font Propo
    position = 0, 200
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hello, $USER
    color = $secondary
    font_size = 25
    font_family = Iosevka Nerd Font Propo
    position = 0, -70
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 290, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $outline
    inner_color = $surface
    font_color = $on_surface
    fade_on_empty = false
    font_family = Iosevka Nerd Font Propo
    placeholder_text = Enter Password...
    hide_input = false
    position = 0, -140
    halign = center
    valign = center
}
