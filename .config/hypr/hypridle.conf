# Hypridle Configuration - Argonaut Desktop
# No brightness control (desktop monitor), longer timeouts

general {
    inhibit_sleep = 2
    lock_cmd = playerctl --all-players pause && pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Lock screen after 15 minutes
listener {
    timeout = 900
    on-timeout = loginctl lock-session
}

# Screen off after 16 minutes
listener {
    timeout = 960
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 45 minutes
listener {
    timeout = 2700
    on-timeout = systemctl suspend
}
