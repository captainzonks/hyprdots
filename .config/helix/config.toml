theme = "gruvbox_dark_hard"

[editor]
line-number = "absolute"
mouse = true
auto-format = false  # Explicit control over formatting
auto-pairs = true    # Auto-complete brackets, quotes, etc

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true        # Visual indentation guides
character = "⸽"      # Unicode character for guide display

[editor.soft-wrap]
enable = true        # Wrap long lines for better readability
