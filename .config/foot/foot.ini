########################################################################
#                            FOOT CONFIG                               #
########################################################################

# include=~/.config/foot/colors.ini

shell=/usr/bin/zsh
term=foot
login-shell=no

app-id=foot
title=foot

# Window settings
initial-window-size-chars=120x30
initial-window-mode=windowed
pad=8x8 center

# Essential display settings
resize-delay-ms=0
dpi-aware=yes

# Font configuration
font=MesloLGMDZNerdFontMono-Regular:size=8
font-bold=MesloLGMDZNerdFontMono-Bold:size=8
font-italic=MesloLGMDZNerdFontMono-Italic:size=8
font-bold-italic=MesloLGMDZNerdFontMono-BoldItalic:size=8
box-drawings-uses-font-glyphs=yes

# Performance
# Set to 8 (physical cores) for better performance than default (16 logical cores)
# Foot cannot parallelize more than visible rows, so limiting threads reduces overhead
workers=8

[environment]
# UWSM handles environment

[security]
osc52=copy-enabled

[bell]
system=no

[desktop-notifications]
command=swaync-client --app-name ${app-id} --icon ${app-id} --category ${category} --urgency ${urgency} --expire-time ${expire-time} --print-id -- ${title} ${body}
inhibit-when-focused=yes

[scrollback]
lines=5000
# Reduced from 10000 for better memory efficiency and faster rendering

[url]
launch=echo "URL copied: ${url}" && echo "${url}" | wl-copy

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes

# Gruvbox Dark Hard
[colors-dark]
alpha=1.0
background=1d2021
foreground=ebdbb2
selection-foreground=ebdbb2
# selection-background=504945  # gruvbox bg2
selection-background=665c54    # gruvbox bg3

# Normal colors
regular0=282828
regular1=cc241d
regular2=98971a
regular3=d79921
regular4=458588
regular5=b16286
regular6=689d6a
regular7=a89984

# Bright colors
bright0=928374
bright1=fb4934
bright2=b8bb26
bright3=fabd2f
bright4=83a598
bright5=d3869b
bright6=8ec07c
bright7=ebdbb2

[key-bindings]
spawn-terminal=Control+Shift+Return
pipe-visible=[wl-copy] Control+Shift+y
quit=Control+Shift+q
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

[mouse-bindings]
primary-paste=BTN_MIDDLE
select-begin=BTN_LEFT
select-extend=BTN_RIGHT

