########################################################################
#                            FOOT CONFIG                               #
########################################################################

include=~/.config/foot/colors.ini

shell=/usr/bin/zsh
term=foot
login-shell=no

app-id=foot
title=foot

# Window settings
initial-window-size-chars=120x30
initial-window-mode=windowed
pad=8x8 center

# Essential display settings
resize-delay-ms=25
dpi-aware=yes

# Font configuration
font=MesloLGMDZNerdFontMono-Regular:size=10
font-bold=MesloLGMDZNerdFontMono-Bold:size=10
font-italic=MesloLGMDZNerdFontMono-Italic:size=10
font-bold-italic=MesloLGMDZNerdFontMono-BoldItalic:size=10
box-drawings-uses-font-glyphs=yes

# Performance
workers=4

[environment]
# UWSM handles environment

[security]
osc52=copy-enabled

[bell]
system=no

[desktop-notifications]
command=swaync-client --app-name ${app-id} --icon ${app-id} --category ${category} --urgency ${urgency} --expire-time ${expire-time} --print-id -- ${title} ${body}
inhibit-when-focused=yes

[scrollback]
lines=5000
# Note: Not using multiplier option due to version compatibility

[url]
launch=echo "URL copied: ${url}" && echo "${url}" | wl-copy

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes

# Colors are loaded from colors.ini via include directive at top of file

[key-bindings]
spawn-terminal=Control+Shift+Return
pipe-visible=[wl-copy] Control+Shift+y
quit=Control+Shift+q
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v

[mouse-bindings]
primary-paste=BTN_MIDDLE
select-begin=BTN_LEFT
select-extend=BTN_RIGHT

# vim: ft=dosini
