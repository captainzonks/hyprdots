# ~/.config/xdg-desktop-portal/hyprland-portals.conf
# Desktop portal backend configuration for Hyprland
# Documentation: https://wiki.hypr.land/Hypr-Ecosystem/xdg-desktop-portal-hyprland/
# Last Updated: 2025-08-20

[preferred]
# Primary backend: use Hyprland portal for most interfaces
default=hyprland;gtk

# Specific interface assignments for optimal compatibility
org.freedesktop.impl.portal.Screencast=hyprland
org.freedesktop.impl.portal.Screenshot=hyprland
org.freedesktop.impl.portal.FileChooser=gtk
org.freedesktop.impl.portal.OpenURI=gtk

# Note: OpenURI is assigned to GTK portal because it has better
# compatibility with browser launching and link handling.
# This ensures JetBrains Toolbox and similar apps can open links properly.
